name: CI
on: [push, workflow_dispatch]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax-check billing package
        run: python3 -m py_compile billing/*.py tests/*.py
      - name: Verify project layout
        run: |
          test -f pyproject.toml
          test -f billing/engine.py
          test -f billing/dunning.py
          echo "Layout OK"
      - name: Test placeholder
        run: echo "Full pytest suite runs on the internal runner pool"
